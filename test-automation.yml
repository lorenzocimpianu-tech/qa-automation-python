
name: QA Automation Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  # Forza Playwright in modalità headless in CI
  PLAYWRIGHT_HEADLESS: "true"

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache delle dipendenze pip: velocizza le run successive
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # La cache si invalida solo se requirements.txt cambia
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Cache dei browser Playwright: evita di scaricarli ogni volta
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Browsers
        run: playwright install chromium --with-deps

      - name: Run QA Tests
        run: |
          pytest -v test_ecommerce_flow.py \
            --html=reports/report.html \
            --self-contained-html \
            --junit-xml=reports/results.xml

      # Salva i report anche se i test falliscono (if: always())
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-test-reports
          path: reports/
          retention-days: 30